services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: file:/data/dev.db
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3100}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-AeOn4.AI <no-reply@aeon4.ai>}
      LEADS_NOTIFY_TO: ${LEADS_NOTIFY_TO:-hello@aeon4.ai}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3100:3100"
    environment:
      API_URL: http://backend:4000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
